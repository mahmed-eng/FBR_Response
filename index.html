<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invoice Sender - API Tester</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #f4f6f9; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
    header { background: #1e3a8a; color: white; padding: 15px 25px; font-size: 1.4em; font-weight: bold; }
    .main { display: flex; height: calc(100vh - 80px); }
    
    .sidebar { width: 380px; border-right: 1px solid #ddd; padding: 20px; overflow-y: auto; background: #fafcff; }
    .content { flex: 1; padding: 20px; overflow-y: auto; background: #f8fafc; }
    
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    textarea { height: 180px; font-family: monospace; resize: vertical; }
    
    button {
      padding: 10px 16px; margin: 5px 2px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;
    }
    .btn-primary { background: #1e3a8a; color: white; }
    .btn-success { background: #15803d; color: white; }
    .btn-danger { background: #dc2626; color: white; }
    .btn-secondary { background: #64748b; color: white; }
    
    .response { background: #1f2937; color: #e0f2fe; padding: 15px; border-radius: 8px; min-height: 300px; font-family: monospace; white-space: pre-wrap; overflow: auto; }
    .status { padding: 8px 12px; border-radius: 6px; margin-bottom: 10px; font-weight: bold; }
    .success { background: #dcfce7; color: #166534; }
    .error { background: #fee2e2; color: #991b1b; }
    
    .excel-info { background: #fef3c7; padding: 12px; border-radius: 6px; margin-top: 15px; font-size: 0.9em; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 8px; border: 1px solid #ddd; text-align: left; }
    th { background: #f1f5f9; }
  </style>
</head>
<body>
  <div class="container">
    <header>🚀 Invoice JSON Sender (Postman Style)</header>
    
    <div class="main">
      <!-- Sidebar: Request -->
      <div class="sidebar">
        <h2>Request</h2>
        
        <div class="form-group">
          <label>API Endpoint URL</label>
          <input type="text" id="apiUrl" placeholder="https://api.example.com/invoice" 
                 value="https://your-api-endpoint.com/api/invoice" />
        </div>

        <div class="form-group">
          <label>Authorization Token</label>
          <input type="text" id="token" placeholder="Bearer your_token_here" />
        </div>

        <div class="form-group">
          <label>JSON Payload (Sample)</label>
          <textarea id="jsonPayload"></textarea>
        </div>

        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
          <button class="btn-primary" onclick="sendRequest()">Send POST Request</button>
          <button class="btn-secondary" onclick="clearAll()">Clear</button>
        </div>

        <hr style="margin: 20px 0;">

        <h3>📊 Import from Excel</h3>
        <p style="font-size: 0.9em; color: #666;">Column B (2nd column), starting from Row 2</p>
        
        <input type="file" id="excelFile" accept=".xlsx,.xls" style="margin-bottom: 10px;" />
        <button class="btn-success" onclick="processExcel()">Import & Process Excel</button>

        <div id="excelStatus" class="excel-info" style="display:none;"></div>

        <div id="jsonList" style="margin-top: 15px; max-height: 300px; overflow-y: auto;"></div>
      </div>

      <!-- Main Content: Response -->
      <div class="content">
        <h2>Response</h2>
        <div id="status" class="status"></div>
        <pre id="response" class="response">Click "Send POST Request" to see response...</pre>
        
        <h3 style="margin-top: 25px;">Batch Results</h3>
        <div id="batchResults" style="margin-top: 10px;"></div>
      </div>
    </div>
  </div>

  <script>
    // Sample JSON
    const sampleJSON = {
      "BuyerCNIC": "",
      "BuyerNTN": "",
      "BuyerName": "",
      "BuyerPhoneNumber": "",
      "DateTime": "2026-01-02T18:13:05.2714143",
      "Discount": 2191.0,
      "FurtherTax": 0.0,
      "InvoiceNumber": null,
      "InvoiceType": 1,
      "POSID": 158377,
      "PaymentMode": 1,
      "RefUSIN": null,
      "TotalBillAmount": 2819.0,
      "TotalQuantity": 3.0,
      "TotalSaleValue": 2389.98,
      "TotalTaxCharged": 430.02,
      "USIN": "ABTDSM-ABTDSM-T1-1767359360183",
      "Items": [
        {
          "Discount": 1196.0,
          "FurtherTax": 0.0,
          "InvoiceType": 1,
          "ItemCode": "KGC-0284-1",
          "ItemName": "GIRLS DENIM 2-14Y",
          "PCTCode": "9991",
          "Quantity": 1.0,
          "RefUSIN": "",
          "SaleValue": 1520.34,
          "TaxCharged": 273.66,
          "TaxRate": 18.0,
          "TotalAmount": 1794.0
        },
        {
          "Discount": 995.0,
          "FurtherTax": 0.0,
          "InvoiceType": 1,
          "ItemCode": "KGPDF-0101",
          "ItemName": "GIRLS SWEATSHIRTS 2-14",
          "PCTCode": "9991",
          "Quantity": 1.0,
          "RefUSIN": "",
          "SaleValue": 843.22,
          "TaxCharged": 151.78,
          "TaxRate": 18.0,
          "TotalAmount": 995.0
        },
        {
          "Discount": 0.0,
          "FurtherTax": 0.0,
          "InvoiceType": 1,
          "ItemCode": "NTS0093",
          "ItemName": "Non Tradeable Shopping Bags",
          "PCTCode": "9991",
          "Quantity": 1.0,
          "RefUSIN": "",
          "SaleValue": 25.42,
          "TaxCharged": 4.58,
          "TaxRate": 18.0,
          "TotalAmount": 30.0
        }
      ]
    };

    document.getElementById("jsonPayload").value = JSON.stringify(sampleJSON, null, 2);

    async function sendRequest(payload = null) {
      const url = document.getElementById("apiUrl").value.trim();
      const token = document.getElementById("token").value.trim();
      const jsonText = payload || document.getElementById("jsonPayload").value.trim();

      if (!url) {
        alert("Please enter API URL");
        return;
      }

      let jsonData;
      try {
        jsonData = JSON.parse(jsonText);
      } catch (e) {
        showStatus("Invalid JSON!", "error");
        return;
      }

      showStatus("Sending request...", "");

      try {
        const response = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": token ? `Bearer ${token}` : "",
            "Accept": "application/json"
          },
          body: JSON.stringify(jsonData)
        });

        const responseText = await response.text();
        let responseJSON;
        try {
          responseJSON = JSON.parse(responseText);
        } catch (e) {
          responseJSON = responseText;
        }

        document.getElementById("response").textContent = 
          `Status: ${response.status} ${response.statusText}\n\n` +
          JSON.stringify(responseJSON, null, 2);

        showStatus(`Response: ${response.status} ${response.statusText}`, 
                   response.ok ? "success" : "error");

      } catch (error) {
        document.getElementById("response").textContent = `Error: ${error.message}`;
        showStatus("Request Failed", "error");
      }
    }

    function showStatus(message, type) {
      const statusDiv = document.getElementById("status");
      statusDiv.textContent = message;
      statusDiv.className = `status ${type}`;
    }

    function clearAll() {
      document.getElementById("response").textContent = "Response cleared...";
      document.getElementById("status").textContent = "";
      document.getElementById("batchResults").innerHTML = "";
    }

    // ====================== EXCEL IMPORT ======================
    let allJsonData = [];

    function processExcel() {
      const fileInput = document.getElementById("excelFile");
      const file = fileInput.files[0];
      if (!file) {
        alert("Please select an Excel file");
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const sheetName = workbook.SheetNames[0];
          const worksheet = workbook.Sheets[sheetName];

          // Convert to array of arrays
          const jsonSheet = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

          allJsonData = [];
          const listDiv = document.getElementById("jsonList");
          listDiv.innerHTML = "<h4>Extracted JSONs from Column B (Row 2+):</h4>";

          // Start from row 1 (0-based index 1 = Row 2)
          for (let i = 1; i < jsonSheet.length; i++) {
            const row = jsonSheet[i];
            if (row && row[1]) { // column B = index 1
              const cellValue = row[1].toString().trim();
              if (cellValue.startsWith("{") || cellValue.startsWith("[")) {
                try {
                  const parsed = JSON.parse(cellValue);
                  allJsonData.push(parsed);

                  const div = document.createElement("div");
                  div.style.cssText = "background:#f1f5f9; padding:10px; margin:8px 0; border-radius:6px; font-size:0.85em; cursor:pointer;";
                  div.textContent = `Invoice ${i}: ${parsed.USIN || parsed.InvoiceNumber || 'No USIN'}`;
                  div.onclick = () => {
                    document.getElementById("jsonPayload").value = JSON.stringify(parsed, null, 2);
                    sendRequest(JSON.stringify(parsed));
                  };
                  listDiv.appendChild(div);
                } catch (err) {
                  console.warn("Failed to parse row", i+2, err);
                }
              }
            }
          }

          document.getElementById("excelStatus").style.display = "block";
          document.getElementById("excelStatus").innerHTML = 
            `<strong>✅ Success!</strong> Loaded <b>${allJsonData.length}</b> JSON records from Column B (starting Row 2).`;

          if (allJsonData.length > 0) {
            const sendAllBtn = document.createElement("button");
            sendAllBtn.textContent = `Send All ${allJsonData.length} Invoices`;
            sendAllBtn.className = "btn-success";
            sendAllBtn.style.marginTop = "10px";
            sendAllBtn.onclick = sendAllInvoices;
            listDiv.appendChild(sendAllBtn);
          }

        } catch (err) {
          alert("Error reading Excel file: " + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
    }

    async function sendAllInvoices() {
      if (allJsonData.length === 0) return;

      const batchDiv = document.getElementById("batchResults");
      batchDiv.innerHTML = "<h4>Batch Sending Results:</h4>";

      for (let i = 0; i < allJsonData.length; i++) {
        const item = allJsonData[i];
        const resultDiv = document.createElement("div");
        resultDiv.style.cssText = "margin: 8px 0; padding: 10px; border-radius: 6px; background: #f8fafc; border: 1px solid #e2e8f0;";

        resultDiv.innerHTML = `<strong>Invoice ${i+1}:</strong> ${item.USIN || 'Processing...'}`;

        batchDiv.appendChild(resultDiv);

        try {
          await sendRequest(JSON.stringify(item));
          resultDiv.innerHTML += ` <span style="color:green;">✓ Success</span>`;
        } catch (e) {
          resultDiv.innerHTML += ` <span style="color:red;">✗ Failed</span>`;
        }

        // Small delay to avoid rate limiting
        await new Promise(resolve => setTimeout(resolve, 800));
      }
    }
  </script>
</body>
</html>
