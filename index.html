<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FBR Invoice Sender - Live API</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #f4f6f9; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
    header { background: #1e3a8a; color: white; padding: 15px 25px; font-size: 1.5em; font-weight: bold; }
    .main { display: flex; height: calc(100vh - 80px); }
    .sidebar { width: 480px; border-right: 1px solid #ddd; padding: 20px; overflow-y: auto; background: #fafcff; }
    .content { flex: 1; padding: 20px; overflow-y: auto; background: #f8fafc; }

    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; }
    input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }

    button {
      padding: 10px 16px; margin: 5px 2px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;
    }
    .btn-primary { background: #1e3a8a; color: white; }
    .btn-success { background: #15803d; color: white; }
    .btn-download { background: #7c3aed; color: white; padding: 12px 20px; font-size: 1.05em; }

    table {
      width: 100%; border-collapse: collapse; margin-top: 10px; background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    th, td {
      padding: 12px 10px; text-align: left; border-bottom: 1px solid #ddd;
    }
    th { background: #1e3a8a; color: white; }
    tr:hover { background: #f1f5f9; }

    .status { padding: 10px; border-radius: 6px; margin: 10px 0; font-weight: bold; }
    .success { background: #dcfce7; color: #166534; }
    .error { background: #fee2e2; color: #991b1b; }
    .response { 
      background: #1f2937; color: #e0f2fe; padding: 15px; border-radius: 8px; 
      min-height: 300px; font-family: monospace; white-space: pre-wrap; overflow: auto; 
    }
  </style>
</head>
<body>
  <div class="container">
    <header>📤 FBR Invoice Sender (Live API)</header>
    
    <div class="main">
      <!-- Sidebar -->
      <div class="sidebar">
        <h2>FBR API Settings</h2>
        
        <div class="form-group">
          <label>API Endpoint (URL)</label>
          <input type="text" id="apiUrl" value="https://gw.fbr.gov.pk/imsp/v1/api/Live/PostData" />
        </div>
        
        <div class="form-group">
          <label>Authorization Token</label>
          <input type="text" id="apiToken" value="15f0b463-b638-3f63-a671-a799fb380468" />
        </div>

        <hr style="margin: 20px 0;">

        <h3>📊 Import Excel File</h3>
        <p><small>Column A = Transaction Number<br>Column B = Full JSON String (Invoice Data)</small></p>
        
        <input type="file" id="excelFile" accept=".xlsx,.xls" style="margin:10px 0;" />
        <button class="btn-success" onclick="processExcel()">Import & Show Table</button>

        <div id="excelStatus" style="margin-top:15px; padding:12px; background:#fef3c7; border-radius:6px; display:none;"></div>
      </div>

      <!-- Main Content -->
      <div class="content">
        <h2>Imported Records Table</h2>
        <div id="tableContainer" style="margin-top: 15px;"></div>

        <div style="margin: 25px 0 15px 0;">
          <button class="btn-download" onclick="downloadRecords()" id="downloadBtn" style="display:none;">
            📥 Download Complete Records (Excel)
          </button>
        </div>

        <h2 style="margin-top: 30px;">FBR API Response / Log</h2>
        <div id="status" class="status"></div>
        <pre id="response" class="response">Import Excel file then click Send to FBR...</pre>

        <div style="margin-top: 20px;">
          <button class="btn-primary" onclick="sendAllToFBR()" style="padding:12px 24px; font-size:1.1em;">
            🚀 Send All Records to FBR
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allRecords = []; 

    function showStatus(msg, type = "") {
      const statusDiv = document.getElementById("status");
      statusDiv.textContent = msg;
      statusDiv.className = `status ${type}`;
    }

    // ==================== PROCESS EXCEL ====================
    function processExcel() {
      const file = document.getElementById("excelFile").files[0];
      if (!file) return alert("Please select an Excel file!");

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

          allRecords = [];
          let html = `
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Transaction Number</th>
                  <th>Invoice ID / USIN</th>
                  <th>JSON Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>`;

          for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row || !row[1]) continue;

            let transactionNo = row[0] ? row[0].toString().trim() : "N/A";
            let jsonStr = row[1].toString().trim();

            let jsonObj = null;
            let statusText = "❌ Invalid JSON";
            let usin = "N/A";

            try {
              jsonObj = JSON.parse(jsonStr);
              statusText = "✅ Valid JSON";
              usin = jsonObj.USIN || jsonObj.InvoiceNumber || jsonObj.invoiceNumber || "Not Found";
            } catch (err) {}

            allRecords.push({
              transactionNo: transactionNo,
              usin: usin,
              jsonObj: jsonObj,
              rowIndex: i + 1,
              fbrResponse: null
            });

            html += `
              <tr>
                <td>${i}</td>
                <td><strong>${transactionNo}</strong></td>
                <td>${usin}</td>
                <td>${statusText}</td>
                <td><button onclick="viewJson(${allRecords.length - 1})" style="padding:5px 10px; font-size:0.85em;">View JSON</button></td>
              </tr>`;
          }

          html += `</tbody></table>`;
          document.getElementById("tableContainer").innerHTML = html;
          document.getElementById("excelStatus").style.display = "block";
          document.getElementById("excelStatus").innerHTML = `✅ <b>${allRecords.length}</b> records loaded successfully`;

          showStatus(`${allRecords.length} records ready to send to FBR`, "success");
          document.getElementById("downloadBtn").style.display = "inline-block";

        } catch (err) {
          alert("Error reading Excel: " + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function viewJson(index) {
      const record = allRecords[index];
      if (!record || !record.jsonObj) return;
      const pretty = JSON.stringify(record.jsonObj, null, 2);
      document.getElementById("response").textContent = 
        `Transaction: ${record.transactionNo}\nInvoice ID: ${record.usin}\n\n${pretty}`;
    }

    // ==================== DOWNLOAD RECORDS AS EXCEL ====================
    function downloadRecords() {
      if (allRecords.length === 0) return alert("No records to download!");

      const exportData = allRecords.map((r, i) => ({
        "Sr No": i + 1,
        "Invoice Number / USIN": r.usin,
        "Transaction Number": r.transactionNo,
        "FBR Response": r.fbrResponse || "Not Sent",
        "Status": r.jsonObj ? "Valid JSON" : "Invalid JSON",
        "Row in Original Excel": r.rowIndex
      }));

      const ws = XLSX.utils.json_to_sheet(exportData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "FBR_Invoice_Records");

      const wscols = [{wch:8}, {wch:25}, {wch:20}, {wch:40}, {wch:15}, {wch:18}];
      ws['!cols'] = wscols;

      XLSX.writeFile(wb, `FBR_Invoice_Records_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    // ==================== SEND TO FBR API ====================
    async function sendAllToFBR() {
      if (allRecords.length === 0) return alert("No records to send!");

      const apiUrl = document.getElementById("apiUrl").value.trim();
      const token = document.getElementById("apiToken").value.trim();

      if (!apiUrl || !token) {
        alert("API URL and Token are required!");
        return;
      }

      const responseDiv = document.getElementById("response");
      responseDiv.textContent = "🚀 Sending records to FBR Live API...\n\n";

      let successCount = 0;

      for (let i = 0; i < allRecords.length; i++) {
        const record = allRecords[i];
        if (!record.jsonObj) {
          responseDiv.textContent += `❌ Row ${record.rowIndex} - Invalid JSON\n`;
          continue;
        }

        responseDiv.textContent += `Sending ${i+1}/${allRecords.length} → Transaction: ${record.transactionNo} | Invoice: ${record.usin}\n`;

        try {
          const res = await fetch(apiUrl, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify(record.jsonObj)
          });

          const resultText = await res.text();
          let result;
          try {
            result = JSON.parse(resultText);
          } catch (e) {
            result = resultText;
          }

          record.fbrResponse = res.ok ? "Success" : "Failed";

          if (res.ok) {
            successCount++;
            responseDiv.textContent += `   ✅ Success → ${JSON.stringify(result).slice(0, 150)}...\n`;
          } else {
            responseDiv.textContent += `   ❌ Failed (HTTP ${res.status}) → ${resultText.slice(0, 200)}\n`;
          }
        } catch (err) {
          record.fbrResponse = "Error";
          responseDiv.textContent += `   ❌ Network Error: ${err.message}\n`;
        }

        await new Promise(r => setTimeout(r, 800)); // Delay to avoid rate limiting
      }

      showStatus(`✅ ${successCount} out of ${allRecords.length} records sent to FBR`, "success");
      responseDiv.textContent += `\n\n🎉 Process Completed! Total Successful: ${successCount}`;
    }
  </script>
</body>
</html>
