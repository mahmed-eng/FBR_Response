<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>API Tester + Excel JSON Import</title>

<style>
    body {
        font-family: Arial;
        margin: 20px;
        background: #f5f5f5;
    }

    h2 {
        margin-bottom: 10px;
    }

    input, textarea, button {
        width: 100%;
        margin-top: 10px;
        padding: 10px;
        font-size: 14px;
    }

    textarea {
        height: 200px;
        font-family: monospace;
    }

    #response {
        background: #000;
        color: #0f0;
        padding: 10px;
        white-space: pre-wrap;
        height: 300px;
        overflow: auto;
        margin-top: 10px;
    }

    .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .box {
        background: white;
        padding: 15px;
        border-radius: 8px;
    }
</style>

</head>
<body>

<h2>API Tester (Postman Style)</h2>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="box">
        <label>API URL</label>
        <input type="text" id="apiUrl" placeholder="https://example.com/api">

        <label>Bearer Token</label>
        <input type="text" id="token" placeholder="Enter token">

        <label>JSON Body</label>
        <textarea id="jsonInput"></textarea>

        <button onclick="sendRequest()">Send Request</button>

        <h3>Import Excel</h3>
        <input type="file" id="excelFile" accept=".xlsx" />
    </div>

    <!-- RIGHT SIDE -->
    <div class="box">
        <h3>Response</h3>
        <div id="response">Response will appear here...</div>
    </div>

</div>

<!-- SheetJS CDN -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

// ===== SEND API REQUEST =====
async function sendRequest() {
    const url = document.getElementById("apiUrl").value;
    const token = document.getElementById("token").value;
    const jsonText = document.getElementById("jsonInput").value;

    let responseBox = document.getElementById("response");

    try {
        const response = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: jsonText
        });

        const data = await response.json();

        responseBox.innerText = JSON.stringify(data, null, 2);

    } catch (err) {
        responseBox.innerText = "Error: " + err;
    }
}

// ===== READ EXCEL =====
document.getElementById("excelFile").addEventListener("change", handleFile);

function handleFile(e) {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event) {
        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, { type: "array" });

        const sheet = workbook.Sheets[workbook.SheetNames[0]];

        // Convert sheet to JSON
        const sheetData = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        let jsonList = [];

        // Column B = index 1
        for (let i = 1; i < sheetData.length; i++) { // start from row 2
            let cellValue = sheetData[i][1];

            if (cellValue) {
                try {
                    let parsed = JSON.parse(cellValue);
                    jsonList.push(parsed);
                } catch (e) {
                    console.log("Invalid JSON at row:", i + 1);
                }
            }
        }

        // Show first JSON in textarea
        if (jsonList.length > 0) {
            document.getElementById("jsonInput").value =
                JSON.stringify(jsonList[0], null, 2);
        }

        console.log("All JSON objects:", jsonList);
    };

    reader.readAsArrayBuffer(file);
}

</script>

</body>
</html>
